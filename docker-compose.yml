services:
  sglang-worker:
    image: runpod/worker-sglang:dev
    pull_policy: never

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - MODEL_NAME=meta-llama/Llama-3.2-1B-Instruct
      - TRUST_REMOTE_CODE=true
      - ATTENTION_BACKEND=flashinfer
      - SAMPLING_BACKEND=flashinfer
      - TOOL_CALL_PARSER=llama3
      # - REASONING_PARSER=llama3
      - HF_TOKEN=${HF_TOKEN}

      # Qwen3.6 27B FP8 serverless preset for a single 80 GB GPU:
      # - MODEL_PATH=Qwen/Qwen3.6-27B-FP8
      # - TP_SIZE=1
      # - MEM_FRACTION_STATIC=0.85
      # - CONTEXT_LENGTH=32768
      # - REASONING_PARSER=qwen3
      # - TOOL_CALL_PARSER=qwen3_coder
      # - SPECULATIVE_ALGORITHM=NEXTN
      # - SPECULATIVE_NUM_STEPS=3
      # - SPECULATIVE_EAGLE_TOPK=1
      # - SPECULATIVE_NUM_DRAFT_TOKENS=4

      # make it work locally with <= 8 GB VRAM
      - MEM_FRACTION_STATIC=0.5
      - CHUNKED_PREFILL_SIZE=512
      - MAX_PREFILL_TOKENS=2048
      - MAX_TOTAL_TOKENS=2048
      - DISABLE_CUDA_GRAPH=true
      - CONTEXT_LENGTH=2048

    ports:
      - "8000:8000"

    volumes:
      - ../var/runpod-volume:/runpod-volume
